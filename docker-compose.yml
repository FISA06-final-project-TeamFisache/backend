services:
  postgres:
    image: pgvector/pgvector:pg16     # pgvector 포함 이미지 (RAG용)
    container_name: wooriport-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wooriport
      POSTGRES_USER: wooriport
      POSTGRES_PASSWORD: wooriport1234
      TZ: Asia/Seoul                  # 한국 시간대(KST) 설정 추가
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 초기 SQL
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wooriport-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data              # Redis 데이터 영구 저장
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: